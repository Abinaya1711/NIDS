<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-Powered Network Intrusion Detection System — Real-time SOC Dashboard">
    <title>AI-NIDS — {% block title %}Dashboard{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Sidebar Navigation -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-container">
                <div class="logo-icon">
                    <i class="bi bi-shield-lock-fill"></i>
                </div>
                <div class="logo-text">
                    <span class="logo-title">AI-NIDS</span>
                    <span class="logo-subtitle">Security Operations</span>
                </div>
            </div>
        </div>

        <ul class="sidebar-nav">
            <li class="nav-section-title">MONITORING</li>
            <li>
                <a href="/dashboard" class="nav-link {% if request.path == '/' or request.path == '/dashboard' %}active{% endif %}" id="nav-dashboard">
                    <i class="bi bi-grid-1x2-fill"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li>
                <a href="/analytics" class="nav-link {% if request.path == '/analytics' %}active{% endif %}" id="nav-analytics">
                    <i class="bi bi-bar-chart-line-fill"></i>
                    <span>Analytics</span>
                </a>
            </li>

            <li class="nav-section-title">INTELLIGENCE</li>
            <li>
                <a href="/analysis" class="nav-link {% if request.path == '/analysis' %}active{% endif %}" id="nav-analysis">
                    <i class="bi bi-robot"></i>
                    <span>AI Analysis</span>
                </a>
            </li>
            <li>
                <a href="/reports" class="nav-link {% if request.path == '/reports' %}active{% endif %}" id="nav-reports">
                    <i class="bi bi-file-earmark-text-fill"></i>
                    <span>Reports</span>
                </a>
            </li>
        </ul>

        <!-- System Status -->
        <div class="sidebar-footer">
            <div class="status-section">
                <div class="status-item" id="status-suricata">
                    <span class="status-dot offline"></span>
                    <span class="status-label">Suricata</span>
                </div>
                <div class="status-item" id="status-ollama">
                    <span class="status-dot offline"></span>
                    <span class="status-label">Ollama AI</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Bar -->
        <header class="top-bar">
            <button class="sidebar-toggle" id="sidebarToggle" onclick="document.body.classList.toggle('sidebar-collapsed')">
                <i class="bi bi-list"></i>
            </button>
            <div class="top-bar-title">
                <h1 class="page-title">{% block page_title %}Dashboard{% endblock %}</h1>
            </div>
            <div class="top-bar-actions">
                <div class="live-indicator" id="liveIndicator">
                    <span class="live-dot"></span>
                    <span>LIVE</span>
                </div>
                <button class="btn-refresh" onclick="refreshData()" id="btn-refresh-data">
                    <i class="bi bi-arrow-clockwise"></i>
                </button>
            </div>
        </header>

        <!-- Page Content -->
        <div class="page-content">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Dashboard JS -->
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>

    {% block scripts %}{% endblock %}
</body>
</html>
